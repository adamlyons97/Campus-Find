name: campusfind
description: "CampusFind – Shariah-Compliant Intelligent Lost & Found Mobile System for University Campuses."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management (Section 8.1 — Riverpod)
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Firebase backend (Section 9 — Cloud Firestore data model)
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3

  # Google Gemini AI (Section 4 / 6 — AI-Powered Smart Match)
  google_generative_ai: ^0.4.6

  # Media & utilities
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  uuid: ^4.4.2

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
